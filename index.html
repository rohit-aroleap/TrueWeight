<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>True Weight</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 18px; }                /* bumps everything up vs. default 16px */

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f0;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 2rem 1rem 3rem;
      line-height: 1.4;
    }

    .container { max-width: 520px; margin: 0 auto; }

    /* ── Header ── */
    header { margin-bottom: 1.75rem; }
    header h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -0.02em; }
    header p  { color: #555; font-size: 1.05rem; margin-top: 0.4rem; font-weight: 500; }
    .version  { font-size: 0.85rem; color: #aaa; margin-top: 0.4rem; }
    .user-name {
      display: inline-block;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      background: #1a1a1a;
      border-radius: 999px;
      padding: 0.35em 1em;
      margin-top: 0.6rem;
    }

    /* ── Cards ── */
    .card {
      background: white;
      border-radius: 18px;
      padding: 1.6rem 1.5rem;
      margin-bottom: 1rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    /* ── Section labels (above tables/charts) ── */
    .section-label {
      font-size: 0.95rem;
      font-weight: 700;
      color: #555;
      margin-bottom: 1.1rem;
      letter-spacing: 0.01em;
    }

    /* ── Name picker screen ── */
    #name-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
      text-align: center;
    }
    #name-screen h1 { font-size: 2.4rem; font-weight: 800; margin-bottom: 0.6rem; }
    #name-screen p  { color: #555; font-size: 1.1rem; margin-bottom: 2rem; max-width: 360px; }
    .name-form {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      width: 100%;
      max-width: 360px;
    }
    .name-form input {
      width: 100%;
      padding: 0.95rem 1.1rem;
      border: 2px solid #d0d0d0;
      border-radius: 12px;
      font-size: 1.15rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .name-form input:focus { border-color: #1a1a1a; }
    .name-form button { width: 100%; padding: 1rem; font-size: 1.15rem; }

    #user-list-wrap {
      width: 100%;
      max-width: 360px;
      margin-top: 2.5rem;
    }
    .user-list-label {
      font-size: 0.95rem;
      color: #555;
      font-weight: 700;
      margin-bottom: 0.8rem;
      text-align: left;
    }
    .user-list { display: flex; flex-direction: column; gap: 0.55rem; }
    .user-pill {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.2rem;
      background: white;
      border: 2px solid #e5e5e5;
      border-radius: 12px;
      font-size: 1.15rem;
      font-weight: 600;
      color: #1a1a1a;
      text-decoration: none;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
    }
    .user-pill:hover, .user-pill:active { border-color: #1a1a1a; transform: translateY(-1px); }
    .user-pill .arrow { color: #888; font-size: 1.4rem; }
    .user-list-empty { font-size: 1rem; color: #888; text-align: left; }

    /* ── True Weight hero ── */
    .hero-card {
      background: #1a1a1a;
      color: white;
      text-align: center;
      padding: 2.5rem 1.5rem;
    }
    .hero-label {
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      opacity: 0.7;
    }
    .hero-value {
      font-size: 5rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.05;
      margin: 0.5rem 0 0.15rem;
    }
    .hero-unit  { font-size: 1.8rem; opacity: 0.7; margin-left: 0.3rem; font-weight: 600; }
    .hero-trend { font-size: 1.05rem; opacity: 0.75; margin-top: 0.7rem; font-weight: 600; }
    .hero-trend.up   { color: #ff8787; opacity: 1; }
    .hero-trend.down { color: #69db7c; opacity: 1; }

    /* ── Today badge ── */
    .today-strip {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1.1rem;
    }
    .today-strip .label   { color: #555; font-weight: 500; }
    .today-strip .value   { font-weight: 700; font-size: 1.25rem; color: #1a1a1a; }
    .today-strip .not-yet { color: #888; font-style: italic; }

    /* ── Log form ── */
    .input-row {
      display: flex;
      gap: 0.85rem;
      align-items: flex-end;
    }
    .input-group { flex: 1; }
    .input-group label {
      display: block;
      font-size: 1rem;
      color: #444;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }
    input[type="number"],
    input[type="date"] {
      width: 100%;
      padding: 0.95rem 1rem;
      border: 2px solid #d0d0d0;
      border-radius: 12px;
      font-size: 1.2rem;
      outline: none;
      transition: border-color 0.15s;
      background: white;
      color: #1a1a1a;
    }
    input:focus { border-color: #1a1a1a; }

    button {
      padding: 1rem 1.4rem;
      background: #1a1a1a;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
      min-height: 52px;
    }
    button:hover  { opacity: 0.85; }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.4; cursor: default; }

    .full-btn { width: 100%; margin-top: 1.25rem; padding: 1.1rem; font-size: 1.2rem; }

    .meals-row { margin-top: 1.25rem; }
    .meals-row > label {
      display: block;
      font-size: 1rem;
      color: #444;
      margin-bottom: 0.6rem;
      font-weight: 600;
    }
    .seg {
      display: flex;
      gap: 0.5rem;
    }
    .seg button {
      flex: 1;
      padding: 0.95rem 0;
      background: white;
      color: #444;
      border: 2px solid #d0d0d0;
      border-radius: 12px;
      font-size: 1.15rem;
      font-weight: 700;
      transition: all 0.12s;
      min-height: 52px;
    }
    .seg button:hover { border-color: #1a1a1a; opacity: 1; }
    .seg button.active {
      background: #1a1a1a;
      color: white;
      border-color: #1a1a1a;
    }

    .status {
      font-size: 1rem;
      margin-top: 0.85rem;
      min-height: 1.4em;
      color: #555;
      font-weight: 500;
    }
    .status.success { color: #2b8a3e; }
    .status.error   { color: #c92a2a; }

    /* ── Log table ── */
    .log-table { width: 100%; border-collapse: collapse; }
    .log-table th {
      font-size: 0.9rem;
      color: #555;
      font-weight: 700;
      text-align: left;
      padding-bottom: 0.85rem;
      border-bottom: 2px solid #e5e5e5;
    }
    .log-table td {
      padding: 0.95rem 0.3rem 0.95rem 0;
      font-size: 1.1rem;
      border-top: 1px solid #eee;
      color: #1a1a1a;
    }
    .log-table th:not(:first-child),
    .log-table td:not(:first-child) { text-align: right; padding-left: 0.3rem; }
    .log-table .today-row td { font-weight: 800; }
    .today-tag {
      display: inline-block;
      font-size: 0.85rem;
      background: #fff3bf;
      color: #5c4500;
      border-radius: 6px;
      padding: 0.15em 0.55em;
      margin-left: 0.5rem;
      font-weight: 700;
    }
    .del-btn {
      background: #f7f7f5;
      border: none;
      color: #888;
      font-size: 1.4rem;
      line-height: 1;
      padding: 0.4rem 0.7rem;
      cursor: pointer;
      border-radius: 8px;
      min-height: 38px;
      min-width: 38px;
      transition: color 0.15s, background 0.15s;
    }
    .del-btn:hover { color: #c92a2a; background: #ffe3e3; }

    .empty-state {
      text-align: center;
      color: #888;
      font-size: 1.05rem;
      padding: 2rem 0;
    }
    .loading { text-align: center; color: #888; padding: 2rem; font-size: 1.05rem; }

    /* ── Chart ── */
    .chart-wrap { position: relative; height: 220px; }
  </style>
</head>
<body>

<!-- ── Name picker (shown when no ?user= param) ── -->
<div id="name-screen" style="display:none;">
  <h1>True Weight</h1>
  <p>Type your name to start, or tap an existing account below.</p>
  <div class="name-form">
    <input type="text" id="name-input" placeholder="Your name" maxlength="40" autocomplete="off" />
    <button id="name-btn">Continue</button>
  </div>

  <div id="user-list-wrap">
    <div class="user-list-label">Existing accounts</div>
    <div id="user-list" class="user-list"></div>
  </div>
</div>

<!-- ── Main app ── -->
<div class="container" id="app" style="display:none;">

  <header>
    <h1>True Weight</h1>
    <p id="today-label"></p>
    <span class="user-name" id="user-label"></span>
    <p class="version">v1.008</p>
  </header>

  <!-- True Weight -->
  <div class="card hero-card">
    <div class="hero-label">True Weight &middot; 15-day average</div>
    <div>
      <span class="hero-value" id="tw-value">—</span><span class="hero-unit">kg</span>
    </div>
    <div class="hero-trend" id="tw-trend">No data yet</div>
  </div>

  <!-- True Weight chart -->
  <div class="card chart-card">
    <div class="section-label">True Weight over time</div>
    <div class="chart-wrap">
      <canvas id="tw-chart"></canvas>
    </div>
  </div>

  <!-- Today's logged weight -->
  <div class="card today-strip">
    <span class="label">Today's logged weight</span>
    <span id="today-weight" class="not-yet">not logged yet</span>
  </div>

  <!-- Log form -->
  <div class="card">
    <div class="input-row">
      <div class="input-group">
        <label>Date</label>
        <input type="date" id="input-date" />
      </div>
      <div class="input-group">
        <label>Weight (kg)</label>
        <input type="number" id="input-weight" step="0.1" min="20" max="500" placeholder="75.0" />
      </div>
    </div>

    <div class="meals-row">
      <label>Meals today</label>
      <div class="seg" id="meals-seg">
        <button type="button" data-val="0">0</button>
        <button type="button" data-val="1">1</button>
        <button type="button" data-val="2">2</button>
        <button type="button" data-val="3">3</button>
        <button type="button" data-val="3+">3+</button>
      </div>
    </div>

    <button id="log-btn" class="full-btn">Log</button>
    <div class="status" id="status-msg"></div>
  </div>

  <!-- Entry log -->
  <div class="card log-card">
    <div class="section-label">Recent Entries</div>
    <div id="log-content" class="loading">Loading…</div>
  </div>

</div>

<script type="module">
  import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
  import { getFirestore, doc, setDoc, deleteDoc, getDocs, collection, query, orderBy }
                             from "https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js";

  // ── Firebase Config ──────────────────────────────────────────────────
  const firebaseConfig = {
    apiKey:            "AIzaSyCdJzTvNpebl7o4Y7MOk4f0qYPLPZC3670",
    authDomain:        "habit-wallet.firebaseapp.com",
    projectId:         "habit-wallet",
    storageBucket:     "habit-wallet.firebasestorage.app",
    messagingSenderId: "744228746481",
    appId:             "1:744228746481:web:73b07e8486d711b6c3e550"
  };
  // ────────────────────────────────────────────────────────────────────

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  let entries = [];
  let twChart = null;
  let USERNAME = "";
  let selectedMeals = null;

  // ── User resolution ──────────────────────────────────────────────────

  function getUser() {
    return new URLSearchParams(window.location.search).get("user")?.trim().toLowerCase() || "";
  }

  function weightsCol() {
    return collection(db, "users", USERNAME, "weights");
  }
  function weightDoc(date) {
    return doc(db, "users", USERNAME, "weights", date);
  }

  // ── Name picker screen ───────────────────────────────────────────────

  async function showNameScreen() {
    document.getElementById("name-screen").style.display = "flex";
    document.getElementById("app").style.display         = "none";
    const go = () => {
      const name = document.getElementById("name-input").value.trim().toLowerCase();
      if (!name) return;
      window.location.href = `?user=${encodeURIComponent(name)}`;
    };
    document.getElementById("name-btn").addEventListener("click", go);
    document.getElementById("name-input").addEventListener("keydown", e => { if (e.key === "Enter") go(); });

    // Populate existing users list
    const listEl = document.getElementById("user-list");
    try {
      const snap = await getDocs(collection(db, "users"));
      const names = snap.docs.map(d => d.id).sort();
      if (names.length === 0) {
        listEl.innerHTML = '<div class="user-list-empty">No accounts yet.</div>';
        return;
      }
      listEl.innerHTML = names.map(n => {
        const display = n.charAt(0).toUpperCase() + n.slice(1);
        return `<a class="user-pill" href="?user=${encodeURIComponent(n)}">
          <span>${display}</span><span class="arrow">→</span>
        </a>`;
      }).join("");
    } catch (err) {
      console.error(err);
      listEl.innerHTML = '<div class="user-list-empty">Could not load accounts.</div>';
    }
  }

  async function registerUser() {
    try {
      await setDoc(doc(db, "users", USERNAME), { name: USERNAME }, { merge: true });
    } catch (err) { console.error("registerUser failed:", err); }
  }

  // ── Helpers ──────────────────────────────────────────────────────────

  function todayISO() {
    return new Date().toLocaleDateString("en-CA");
  }

  function fmtDate(iso) {
    const [y, m, d] = iso.split("-").map(Number);
    return new Date(y, m - 1, d).toLocaleDateString("en-US", { month: "short", day: "numeric" });
  }

  function rollingAvg(arr, idx, win = 15) {
    // Build a window of the most recent `win` entries that have a weight, up to idx
    const out = [];
    for (let i = idx; i >= 0 && out.length < win; i--) {
      if (arr[i].weight !== null && arr[i].weight !== undefined && !Number.isNaN(arr[i].weight)) {
        out.push(arr[i].weight);
      }
    }
    if (out.length === 0) return null;
    return out.reduce((s, w) => s + w, 0) / out.length;
  }

  // ── Firebase ─────────────────────────────────────────────────────────

  async function loadEntries() {
    try {
      const snap = await getDocs(query(weightsCol(), orderBy("date", "asc")));
      entries = snap.docs.map(d => {
        const data = d.data();
        return { date: d.id, weight: Number(data.weight), meals: data.meals ?? null };
      });
    } catch (err) {
      console.error(err);
      setStatus("Could not load data.", "error");
    }
    render();
  }

  async function saveEntry(date, weight, meals) {
    const hasWeight = weight !== null && weight !== undefined && !Number.isNaN(weight);
    const hasMeals  = meals  !== null && meals  !== undefined;
    if (!hasWeight && !hasMeals) return;

    const payload = { date };
    if (hasWeight) payload.weight = weight;
    if (hasMeals)  payload.meals  = meals;

    await setDoc(weightDoc(date), payload, { merge: true });
    registerUser(); // fire-and-forget

    const i = entries.findIndex(e => e.date === date);
    if (i >= 0) {
      if (hasWeight) entries[i].weight = weight;
      if (hasMeals)  entries[i].meals  = meals;
    } else {
      entries.push({
        date,
        weight: hasWeight ? weight : null,
        meals:  hasMeals  ? meals  : null
      });
      entries.sort((a, b) => a.date.localeCompare(b.date));
    }
    render();
  }

  async function deleteEntry(date) {
    await deleteDoc(weightDoc(date));
    entries = entries.filter(e => e.date !== date);
    render();
  }

  // ── Chart ─────────────────────────────────────────────────────────────

  function renderChart() {
    // Only chart days that have a weight; rolling avg is computed against full series
    const points = entries
      .map((e, i) => ({ e, avg: rollingAvg(entries, i) }))
      .filter(p => p.e.weight != null && p.avg !== null);
    if (points.length < 2) return;

    const labels  = points.map(p => fmtDate(p.e.date));
    const avgs    = points.map(p => parseFloat(p.avg.toFixed(2)));
    const minVal  = Math.min(...avgs);
    const maxVal  = Math.max(...avgs);
    const padding = Math.max((maxVal - minVal) * 0.4, 0.5);

    const ctx = document.getElementById("tw-chart").getContext("2d");

    if (twChart) {
      twChart.data.labels           = labels;
      twChart.data.datasets[0].data = avgs;
      twChart.options.scales.y.min  = parseFloat((minVal - padding).toFixed(1));
      twChart.options.scales.y.max  = parseFloat((maxVal + padding).toFixed(1));
      twChart.update();
      return;
    }

    twChart = new Chart(ctx, {
      type: "line",
      data: {
        labels,
        datasets: [{
          data: avgs,
          borderColor: "#1a1a1a",
          borderWidth: 2,
          pointRadius: entries.length > 60 ? 0 : 3,
          pointBackgroundColor: "#1a1a1a",
          tension: 0.35,
          fill: true,
          backgroundColor: "rgba(26,26,26,0.06)"
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: {
          callbacks: { label: c => `${c.parsed.y.toFixed(1)} kg` }
        }},
        scales: {
          x: {
            ticks: { font: { size: 13 }, color: "#666", maxTicksLimit: 6, maxRotation: 0 },
            grid: { display: false },
            border: { display: false }
          },
          y: {
            min: parseFloat((minVal - padding).toFixed(1)),
            max: parseFloat((maxVal + padding).toFixed(1)),
            ticks: { font: { size: 13 }, color: "#666", count: 4 },
            grid: { color: "#ececec" },
            border: { display: false }
          }
        }
      }
    });
  }

  // ── Render ────────────────────────────────────────────────────────────

  function render() {
    const today = todayISO();

    // Hero
    const twEl    = document.getElementById("tw-value");
    const trendEl = document.getElementById("tw-trend");
    if (entries.length === 0) {
      twEl.textContent    = "—";
      trendEl.textContent = "Log your first entry above";
      trendEl.className   = "hero-trend";
    } else {
      const last    = entries.length - 1;
      const current = rollingAvg(entries, last);
      if (current === null) {
        twEl.textContent    = "—";
        trendEl.textContent = "Log a weight to see your True Weight";
        trendEl.className   = "hero-trend";
      } else {
        twEl.textContent = current.toFixed(1);

        const d7 = new Date(); d7.setDate(d7.getDate() - 7);
        const d7iso   = d7.toLocaleDateString("en-CA");
        const prevIdx = [...entries].reverse().findIndex(e => e.date <= d7iso);
        const prev    = prevIdx >= 0 ? rollingAvg(entries, entries.length - 1 - prevIdx) : null;
        if (prev !== null) {
          const diff = current - prev;
          const sign = diff >= 0 ? "+" : "";
          const arrow = diff > 0.05 ? "▲ " : diff < -0.05 ? "▼ " : "";
          trendEl.textContent = `${arrow}${sign}${diff.toFixed(1)} kg vs 7 days ago`;
          trendEl.className   = "hero-trend " + (diff > 0.05 ? "up" : diff < -0.05 ? "down" : "");
        } else {
          const wCount = entries.filter(e => e.weight != null).length;
          trendEl.textContent = `Based on ${Math.min(wCount, 15)} entr${wCount === 1 ? "y" : "ies"}`;
          trendEl.className   = "hero-trend";
        }
      }
    }

    renderChart();

    // Today strip
    const todayEntry = entries.find(e => e.date === today);
    const twSpan     = document.getElementById("today-weight");
    if (todayEntry && todayEntry.weight != null) {
      twSpan.textContent = `${todayEntry.weight.toFixed(1)} kg`;
      twSpan.className   = "value";
    } else {
      twSpan.textContent = "not logged yet";
      twSpan.className   = "not-yet";
    }

    // Log table
    const container = document.getElementById("log-content");
    if (entries.length === 0) {
      container.innerHTML = '<div class="empty-state">No entries yet.</div>';
      return;
    }
    const recent = [...entries].slice(-30).reverse();
    const rows = recent.map(e => {
      const gi  = entries.findIndex(x => x.date === e.date);
      const avg = rollingAvg(entries, gi);
      const isT = e.date === today;
      const meals  = (e.meals ?? null) === null ? "—" : e.meals;
      const wStr   = e.weight != null ? e.weight.toFixed(1) : "—";
      const avgStr = avg !== null ? avg.toFixed(1) : "—";
      return `<tr class="${isT ? "today-row" : ""}">
        <td>${fmtDate(e.date)}${isT ? '<span class="today-tag">today</span>' : ""}</td>
        <td>${wStr}</td>
        <td>${avgStr}</td>
        <td>${meals}</td>
        <td><button class="del-btn" data-date="${e.date}" title="Delete">×</button></td>
      </tr>`;
    }).join("");

    container.innerHTML = `
      <table class="log-table">
        <thead><tr><th>Date</th><th>Logged</th><th>Avg (15d)</th><th>Meals</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;

    container.querySelectorAll(".del-btn").forEach(btn => {
      btn.addEventListener("click", async () => {
        const date = btn.dataset.date;
        if (!confirm(`Delete entry for ${fmtDate(date)}?`)) return;
        btn.disabled = true;
        try { await deleteEntry(date); }
        catch (err) { console.error(err); btn.disabled = false; }
      });
    });
  }

  // ── UI helpers ────────────────────────────────────────────────────────

  function setStatus(msg, type = "") {
    const el = document.getElementById("status-msg");
    el.textContent = msg;
    el.className   = "status " + type;
  }

  // ── Boot ──────────────────────────────────────────────────────────────

  USERNAME = getUser();

  if (!USERNAME) {
    showNameScreen();
  } else {
    document.getElementById("name-screen").style.display = "none";
    document.getElementById("app").style.display         = "block";

    // Capitalise first letter for display only
    document.getElementById("user-label").textContent =
      USERNAME.charAt(0).toUpperCase() + USERNAME.slice(1);

    document.getElementById("input-date").value = todayISO();
    document.getElementById("today-label").textContent = new Date().toLocaleDateString("en-US", {
      weekday: "long", year: "numeric", month: "long", day: "numeric"
    });

    // Meals segmented control
    const seg = document.getElementById("meals-seg");
    seg.querySelectorAll("button").forEach(b => {
      b.addEventListener("click", () => {
        seg.querySelectorAll("button").forEach(x => x.classList.remove("active"));
        b.classList.add("active");
        selectedMeals = b.dataset.val;
      });
    });

    document.getElementById("log-btn").addEventListener("click", async () => {
      const date     = document.getElementById("input-date").value;
      const wRaw     = document.getElementById("input-weight").value.trim();
      const weight   = wRaw === "" ? null : parseFloat(wRaw);
      const hasW     = weight !== null && !Number.isNaN(weight);
      const hasM     = selectedMeals !== null;

      if (!date)                                       { setStatus("Pick a date.", "error"); return; }
      if (!hasW && !hasM)                              { setStatus("Enter a weight or pick meals.", "error"); return; }
      if (hasW && (weight < 20 || weight > 500))       { setStatus("Enter a valid weight (20–500 kg).", "error"); return; }

      const btn = document.getElementById("log-btn");
      btn.disabled = true;
      setStatus("Saving…");
      try {
        await saveEntry(date, hasW ? weight : null, hasM ? selectedMeals : null);
        setStatus("Saved!", "success");
        document.getElementById("input-weight").value = "";
        document.getElementById("input-date").value   = todayISO();
        seg.querySelectorAll("button").forEach(x => x.classList.remove("active"));
        selectedMeals = null;
      } catch (err) {
        setStatus("Save failed.", "error");
        console.error(err);
      } finally {
        btn.disabled = false;
      }
    });

    registerUser(); // ensure existing users (with prior data) show up in list
    loadEntries();
  }
</script>
</body>
</html>
